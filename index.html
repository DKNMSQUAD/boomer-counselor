<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <meta name="theme-color" content="#ffffff">
  <title>Boomer Counselor</title>
  <meta name="description" content="Because your future deserves more than guesswork. College counselling tools for students who mean business.">

  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;700;900&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // =====================================================================
    // CONFIG - replace these with your real values (see README.md)
    // =====================================================================
    window.BC_CONFIG = {
      GOOGLE_CLIENT_ID: "226421699415-t9d0vg9r7dbb1v94kkrgfgdu0m0en7qt.apps.googleusercontent.com",
      SHEETS_WEBHOOK_URL: "https://script.google.com/macros/s/AKfycbyGquSlw0PqDyyn3HzUAKovwOxz3bw1iBIUtIxjMFYkCp_xSz58vP3E7LLX9ni6Gu4j/exec"
    };
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Mulish', system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      min-height: 100dvh;
      padding: 40px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
      position: relative;
    }

    .logo-slot {
      margin-bottom: 40px;
    }
    .logo-img {
      width: 360px;
      height: auto;
      display: block;
      transform: rotate(-2deg);
      transition: transform 0.3s;
    }
    .logo-img:hover { transform: rotate(0deg) scale(1.03); }

    .content-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 720px;
      width: 100%;
    }

    .headline {
      font-weight: 900;
      font-size: clamp(2.4rem, 4.8vw, 4rem);
      line-height: 1.08;
      letter-spacing: -0.025em;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .est-line {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: clamp(2rem, 3.8vw, 3rem);
      color: #FDB515;
      line-height: 1;
      margin-bottom: 22px;
      font-style: italic;
    }

    .subtitle {
      font-family: 'Mulish', system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(17px, 1.7vw, 21px);
      line-height: 1.5;
      color: #FDB515;
      margin-bottom: 32px;
      max-width: 640px;
    }

    .action-row {
      display: flex;
      gap: 14px;
      align-items: stretch;
      max-width: 720px;
      flex-wrap: wrap;
    }

    .dropdown-wrap { flex: 1 1 0; min-width: 280px; position: relative; }

    .dropdown-trigger {
      width: 100%;
      background: #fff;
      border: 2.5px solid #1a1a1a;
      border-radius: 10px;
      padding: 17px 22px;
      font-family: inherit;
      font-weight: 700;
      font-size: 16px;
      color: #1a1a1a;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
      height: 60px;
      cursor: pointer;
    }
    .dropdown-trigger:hover { background: #fafafa; }
    .dropdown-trigger.open { background: #f5f5f5; }
    .dropdown-trigger .chevron { flex-shrink: 0; transition: transform 0.25s; }
    .dropdown-trigger.open .chevron { transform: rotate(180deg); }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: #fff;
      border: 2.5px solid #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      transition: max-height 0.3s ease, opacity 0.2s ease;
      z-index: 100;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    }
    .dropdown-menu.open {
      max-height: 560px;
      opacity: 1;
      pointer-events: auto;
    }
    .dropdown-item {
      padding: 14px 20px;
      font-weight: 700;
      font-size: 15px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: background 0.15s;
      border-bottom: 1.5px solid #f0f0f0;
      cursor: pointer;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #FFF8E1; }
    .dropdown-item .label { flex: 1; }
    .dropdown-item.disabled { opacity: 0.6; }
    .dropdown-item .pill {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
    }
    .dropdown-item .pill.ready {
      background: #E8F5E9; color: #2e7d32;
      border: 1px solid #2e7d32;
    }
    .dropdown-item .pill.soon {
      background: #F5F5F5; color: #666;
      border: 1px solid #999;
    }

    .google-btn {
      background: #FDB515;
      color: #1a1a1a;
      border: 2.5px solid #1a1a1a;
      border-radius: 10px;
      padding: 17px 26px;
      font-family: inherit;
      font-weight: 900;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 60px;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
      flex: 1 1 0;
      min-width: 280px;
      cursor: pointer;
    }
    .google-btn:not(:disabled):hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #1a1a1a;
    }
    .google-btn:not(:disabled):active {
      transform: translate(0, 0);
      box-shadow: 0 0 0 #1a1a1a;
    }
    .google-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .google-btn svg { flex-shrink: 0; }

    .signed-in-pill {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 10px 10px;
      background: #FFF8E1;
      border: 2.5px solid #1a1a1a;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      margin-top: 14px;
      max-width: 720px;
      width: 100%;
      box-sizing: border-box;
    }
    .signed-in-pill.show { display: inline-flex; }
    .signed-in-pill img {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid #1a1a1a;
    }
    .signed-in-pill .sign-out {
      margin-left: auto;
      background: none;
      border: none;
      color: #666;
      font-weight: 700;
      font-size: 12px;
      text-decoration: underline;
      cursor: pointer;
    }

    .hero-footer {
      position: absolute;
      bottom: 18px;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1.5px solid #1a1a1a;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
    }
    .hero-footer a { color: #666; text-decoration: none; }
    .hero-footer a:hover { color: #1a1a1a; }

    .tool-section {
      min-height: 100vh;
      min-height: 100dvh;
      padding: 16px;
      background: #0a0015;
      display: none;
    }
    .tool-section.active { display: block; }
    .tool-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      margin-bottom: 12px;
    }
    .tool-brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 900;
      font-size: 16px;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .tool-brand .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #FDB515;
    }
    .tool-title {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .back-btn {
      background: #FDB515;
      border: 2px solid #1a1a1a;
      color: #1a1a1a;
      padding: 8px 16px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .back-btn:hover { background: #ffc947; }
    .tool-frame-wrap {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      height: calc(100vh - 94px);
      height: calc(100dvh - 94px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .tool-frame-wrap iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }
    .tool-loading {
      position: absolute; inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #666;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.3s;
    }
    .tool-loading.hide { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #eee;
      border-top-color: #FDB515;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .soon-modal {
      position: fixed; inset: 0;
      background: rgba(26, 26, 26, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .soon-modal.open { display: flex; }
    .modal-content {
      background: #fff;
      border: 2.5px solid #1a1a1a;
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 420px;
      text-align: center;
      box-shadow: 8px 8px 0 #1a1a1a;
    }
    .modal-content h3 {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .modal-content p {
      color: #444;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
      font-weight: 500;
    }
    .modal-btn {
      background: #FDB515;
      color: #1a1a1a;
      border: 2.5px solid #1a1a1a;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 900;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }
    .modal-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #1a1a1a;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 1001;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 960px) {
      .hero { padding: 32px 20px 20px; }
      .logo-img { width: 260px; }
      .logo-slot { margin-bottom: 32px; }
      .action-row { flex-direction: column; width: 100%; }
      .google-btn { width: 100%; justify-content: center; }
    }
    @media (max-width: 480px) {
      .hero { padding: 24px 16px 72px; }
      .dropdown-trigger, .google-btn { height: 56px; padding: 14px 18px; font-size: 15px; }
      .hero-footer { font-size: 10px; flex-direction: column; gap: 6px; text-align: center; padding-top: 10px; }
      .logo-img { width: 200px; }
      .logo-slot { margin-bottom: 24px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="logo-slot">
    <img class="logo-img" src="logo.png" alt="Boomer Counselor logo">
  </div>

  <div class="content-slot">

    <div class="action-row">
      <div class="dropdown-wrap">
        <button class="dropdown-trigger" id="trigger" aria-haspopup="listbox" aria-expanded="false">
          <span id="selected">You&rsquo;re wondering about&hellip;</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dropdown-menu" id="menu" role="listbox"></div>
      </div>

      <button class="google-btn" id="signin" disabled>
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2c-.4.4 6.6-4.8 6.6-14.8 0-1.3-.1-2.3-.4-3.5z"/>
        </svg>
        <span id="signinText">Sign in with Google to get started</span>
      </button>
    </div>

    <div class="signed-in-pill" id="signedInPill">
      <img id="pillAvatar" src="" alt="">
      <span id="pillName"></span>
      <button class="sign-out" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="hero-footer">
    <span>&copy; 2026 boomer counselor</span>
    <div style="display: flex; gap: 20px;">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </div>
  </div>
</section>

<section class="tool-section" id="toolSection">
  <div class="tool-header">
    <div class="tool-brand">
      <span class="dot"></span>
      <span>boomer counselor</span>
    </div>
    <span class="tool-title" id="toolTitle"></span>
    <button class="back-btn" onclick="backToHome()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Home
    </button>
  </div>
  <div class="tool-frame-wrap">
    <div class="tool-loading" id="toolLoading">
      <div class="spinner"></div>
      <span>Loading your tool...</span>
    </div>
    <iframe id="toolFrame" title="Selected tool" allow="clipboard-read; clipboard-write"></iframe>
  </div>
</section>

<div class="soon-modal" id="soonModal" onclick="if(event.target===this)closeSoon()">
  <div class="modal-content">
    <h3>Coming soon</h3>
    <p>We are building this one right now. Use a ready tool and we will ping you the moment this drops.</p>
    <button class="modal-btn" onclick="closeSoon()">Got it</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const options = [
    { id: 'careers',      label: 'Career Discovery',           url: '/careers/' },
    { id: 'profile',      label: 'Building Your Profile',      url: '/profile/' },
    { id: 'college',      label: 'Choosing The Right College', url: '/college-search/' },
    { id: 'tutors',       label: 'Tutor & Counselor Search',   url: null },
    { id: 'scholarships', label: 'Scholarship Search',         url: null },
    { id: 'essays',       label: 'Essay Feedback',             url: null }
  ];

  const trigger    = document.getElementById('trigger');
  const menu       = document.getElementById('menu');
  const selected   = document.getElementById('selected');
  const signin     = document.getElementById('signin');
  const signinText = document.getElementById('signinText');
  const pill       = document.getElementById('signedInPill');
  const pillAvatar = document.getElementById('pillAvatar');
  const pillName   = document.getElementById('pillName');
  const toastEl    = document.getElementById('toast');
  let currentOpt   = null;
  let currentUser  = null;

  // Try to restore session from localStorage
  try {
    const stored = localStorage.getItem('bc_user');
    if (stored) {
      currentUser = JSON.parse(stored);
      showSignedIn(currentUser);
    }
  } catch(e) {}

  // Populate dropdown
  options.forEach(opt => {
    const el = document.createElement('div');
    el.className = 'dropdown-item' + (opt.url ? '' : ' disabled');
    el.setAttribute('role', 'option');
    el.innerHTML = `
      <span class="label">${opt.label}</span>
      <span class="pill ${opt.url ? 'ready' : 'soon'}">${opt.url ? 'Ready' : 'Soon'}</span>
    `;
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      selectOption(opt);
    });
    menu.appendChild(el);
  });

  trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = trigger.classList.toggle('open');
    menu.classList.toggle('open', isOpen);
    trigger.setAttribute('aria-expanded', isOpen);
  });
  document.addEventListener('click', () => {
    trigger.classList.remove('open');
    menu.classList.remove('open');
    trigger.setAttribute('aria-expanded', 'false');
  });

  function selectOption(opt) {
    currentOpt = opt;
    selected.textContent = opt.label;
    trigger.classList.remove('open');
    menu.classList.remove('open');
    signin.disabled = false;

    if (currentUser) {
      // Already signed in - label button as "continue"
      signinText.textContent = opt.url ? `Continue as ${currentUser.given_name || currentUser.name.split(' ')[0]}` : 'Join the waitlist';
    } else {
      signinText.textContent = opt.url ? 'Sign in with Google to get started' : 'Sign in with Google, join waitlist';
    }
  }

  signin.addEventListener('click', () => {
    if (!currentOpt) return;
    if (currentUser) {
      // Already signed in - log this selection and go
      logAndGo(currentUser, currentOpt);
    } else {
      // Trigger Google Sign-In popup
      promptGoogleSignIn();
    }
  });

  // ===== GOOGLE SIGN-IN =====
  function onGoogleLibraryLoad() {
    if (!window.google || !window.google.accounts) return;
    google.accounts.id.initialize({
      client_id: window.BC_CONFIG.GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
      auto_select: false,
      cancel_on_tap_outside: true
    });
    // One Tap - shows the LinkedIn-style auto-prompt
    google.accounts.id.prompt();
  }

  // Poll until library loads (async script)
  (function waitForGoogle() {
    if (window.google && window.google.accounts) {
      onGoogleLibraryLoad();
    } else {
      setTimeout(waitForGoogle, 200);
    }
  })();

  function promptGoogleSignIn() {
    if (!window.google || !window.google.accounts) {
      toast('Google Sign-In is still loading. Try again in a sec.');
      return;
    }
    // Use renderButton hack: programmatically click the hidden GSI button
    // Since we want our custom yellow button to trigger it, we use the popup OAuth flow
    google.accounts.id.prompt((notification) => {
      if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
        // One Tap was dismissed or blocked - fall back to popup
        fallbackSignIn();
      }
    });
  }

  function fallbackSignIn() {
    // Use OAuth 2.0 token flow for fallback
    const tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: window.BC_CONFIG.GOOGLE_CLIENT_ID,
      scope: 'email profile openid',
      callback: (resp) => {
        if (resp.access_token) {
          // Fetch user info from Google API
          fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { 'Authorization': 'Bearer ' + resp.access_token }
          })
          .then(r => r.json())
          .then(user => {
            const u = {
              sub: user.sub,
              email: user.email,
              email_verified: user.email_verified,
              name: user.name,
              given_name: user.given_name,
              family_name: user.family_name,
              picture: user.picture,
              locale: user.locale
            };
            onUserSignedIn(u);
          })
          .catch(err => toast('Sign-in failed. Please try again.'));
        }
      }
    });
    tokenClient.requestAccessToken();
  }

  function handleCredentialResponse(resp) {
    // Decode the JWT credential (no verification needed client-side for display)
    const payload = parseJwt(resp.credential);
    const u = {
      sub: payload.sub,
      email: payload.email,
      email_verified: payload.email_verified,
      name: payload.name,
      given_name: payload.given_name,
      family_name: payload.family_name,
      picture: payload.picture,
      locale: payload.locale
    };
    onUserSignedIn(u);
  }

  function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(jsonPayload);
  }

  function onUserSignedIn(user) {
    currentUser = user;
    try { localStorage.setItem('bc_user', JSON.stringify(user)); } catch(e) {}
    showSignedIn(user);

    // Log the sign-in itself as a distinct event
    logEvent({
      eventType: 'sign_in',
      action: 'oauth_success',
    });

    // If they had a tool selected, go to it now
    if (currentOpt) {
      logAndGo(user, currentOpt);
    } else {
      toast(`Welcome, ${user.given_name || user.name.split(' ')[0]}!`);
    }
  }

  function showSignedIn(user) {
    pillAvatar.src = user.picture;
    pillName.textContent = user.email;
    pill.classList.add('show');
    if (currentOpt) {
      signinText.textContent = currentOpt.url
        ? `Continue as ${user.given_name || user.name.split(' ')[0]}`
        : 'Join the waitlist';
    }
  }

  function signOut() {
    // Immediately tear down any open tool and clear state
    try {
      const frame = document.getElementById('toolFrame');
      if (frame) frame.src = 'about:blank';
      document.getElementById('toolSection').classList.remove('active');
    } catch(e) {}
    currentUser = null;
    currentOpt = null;
    try { localStorage.removeItem('bc_user'); } catch(e) {}
    if (window.google && window.google.accounts) {
      google.accounts.id.disableAutoSelect();
    }
    // Hard reload so the page is guaranteed to be back at the sign-in gate
    window.location.replace('/');
  }

  function logAndGo(user, opt) {
    // Existing sign_in + tool_open log
    logEvent({
      eventType: 'tool_open',
      tool: opt.id,
      selection: { id: opt.id, label: opt.label, url: opt.url, status: opt.url ? 'ready' : 'waitlist' },
    });
    if (opt.url) {
      openTool(opt);
    } else {
      openSoon(opt);
    }
  }

  // Generic event logger — used for sign_in, tool_open, tool_filter, link_click, college_shortlist, tool_close
  function logEvent(event) {
    const url = window.BC_CONFIG.SHEETS_WEBHOOK_URL;
    if (!url || url.startsWith('__')) {
      console.log('[BC] Sheets webhook not configured, skipping log.');
      return;
    }
    if (!currentUser) {
      console.log('[BC] No user in session, skipping log.');
      return;
    }
    const payload = {
      eventType: event.eventType,
      timestamp: event.timestamp || new Date().toISOString(),
      tool: event.tool || '',
      action: event.action || '',
      targetId: event.targetId || '',
      targetLabel: event.targetLabel || '',
      extraData: event.extraData ? JSON.stringify(event.extraData) : '',
      // Keep the old selection shape for backward compat on tool_open
      selection: event.selection || null,
      user: {
        sub: currentUser.sub,
        email: currentUser.email,
        name: currentUser.name,
        given_name: currentUser.given_name,
        family_name: currentUser.family_name,
        picture: currentUser.picture,
        email_verified: currentUser.email_verified,
        locale: currentUser.locale,
      },
      location: currentLocation || null,
      meta: {
        referrer: document.referrer || '',
        user_agent: navigator.userAgent,
        language: navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        screen: `${screen.width}x${screen.height}`,
        viewport: `${window.innerWidth}x${window.innerHeight}`,
        device_type: /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'mobile' : 'desktop',
        page_url: location.href,
      },
    };
    fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    }).catch(err => console.warn('[BC] log failed', err));
  }

  // Location capture via ipapi.co (free tier, no key needed)
  let currentLocation = null;
  async function captureLocation() {
    try {
      const r = await fetch('https://ipapi.co/json/');
      if (!r.ok) return;
      const d = await r.json();
      currentLocation = {
        ip: d.ip || '',
        city: d.city || '',
        region: d.region || '',
        country_code: d.country_code || '',
        country_name: d.country_name || '',
        postal: d.postal || '',
        latitude: d.latitude || null,
        longitude: d.longitude || null,
        timezone: d.timezone || '',
        org: d.org || '',
      };
    } catch (e) {
      console.warn('[BC] location fetch failed', e);
    }
  }
  captureLocation();

  // Listen for events from iframed tools via postMessage
  window.addEventListener('message', (e) => {
    if (e.origin !== window.location.origin) return;
    const d = e.data;
    if (!d || d.type !== 'bc-event') return;
    // Log with the user context the hub holds
    logEvent({
      eventType: d.name || 'tool_event',
      tool: d.tool || '',
      action: d.action || '',
      targetId: d.targetId || '',
      targetLabel: d.targetLabel || '',
      extraData: d.extraData || null,
    });
  });

  function openTool(opt) {
    // Hard gate: no tool opens without a signed-in user
    if (!currentUser) {
      toast('Please sign in with Google first.');
      return;
    }
    const section = document.getElementById('toolSection');
    const frame   = document.getElementById('toolFrame');
    const loading = document.getElementById('toolLoading');
    document.getElementById('toolTitle').textContent = opt.label;
    loading.classList.remove('hide');
    section.classList.add('active');
    frame.src = opt.url;
    frame.onload = () => loading.classList.add('hide');
    setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
  }

  function backToHome() {
    // Log that user closed the tool
    const toolTitle = document.getElementById('toolTitle').textContent;
    if (toolTitle) {
      logEvent({ eventType: 'tool_close', tool: toolTitle });
    }
    document.querySelector('.hero').scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => {
      document.getElementById('toolSection').classList.remove('active');
      document.getElementById('toolFrame').src = 'about:blank';
    }, 650);
  }

  function openSoon() {
    document.getElementById('soonModal').classList.add('open');
  }
  function closeSoon() {
    document.getElementById('soonModal').classList.remove('open');
  }

  let toastTimer;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }
</script>

</body>
</html>
